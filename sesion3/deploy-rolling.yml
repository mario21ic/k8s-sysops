kind: Deployment
apiVersion: apps/v1
metadata:
  name: nginx-dp-rolling
spec:
  selector:
    matchLabels:
      app: nginx
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: mario21ic/nginx:alpine
        #image: nginx:alpine
