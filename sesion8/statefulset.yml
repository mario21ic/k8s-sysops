kind: Service
apiVersion: v1
metadata:
 name: nginx
 labels:
   app: nginx
spec:
 ports:
 - port: 80
   name: web
 # No tiene IP virtual. En lugar de balancear tráfico, expone DNS individual por pod
 # nslookup web-0.nginx.default.svc.cluster.local
 # Verificar DNS del Headless Service completo
 # nslookup nginx.default.svc.cluster.local
 clusterIP: None
 selector:
   app: nginx
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
 name: web
spec:
 serviceName: "nginx"
 replicas: 2
 selector:
   matchLabels:
     app: nginx
 template:
   metadata:
     labels:
       app: nginx
   spec:
     containers:
     - name: nginx
       image: nginx:alpine
       ports:
       - containerPort: 80
         name: web
       volumeMounts:
       - name: www
         mountPath: /usr/share/nginx/html
 # Crea automáticamente un PVC exclusivo por pod
 # Si web-0 muere y se recrea, vuelve a montar el mismo PVC con sus datos intactos.
 volumeClaimTemplates:
 - metadata:
     name: www
   spec:
     accessModes: [ "ReadWriteOnce" ]
     resources:
       requests:
         storage: 10Mi
