kind: CronJob
apiVersion: batch/v1
metadata:
  name: countdown-cronjob
spec:
  schedule: "55 20 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: counter
            image: alpine
            command:
            - "bin/sh"
            - "-c"
            - "for i in 9 8 7 6 5 4 3 2 1 ; do echo $i ; done"
          restartPolicy: OnFailure
