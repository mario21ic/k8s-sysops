apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
  - host: hello-world.info
    http:
      paths:
      - path: /v2/(.*)          # ✅ grupo de captura para el rewrite
        pathType: ImplementationSpecific   # ✅ permite regex
        backend:
          service:
            name: web2-svc
            port:
              number: 8080
      - path: /(.*)             # ✅ también con captura para consistencia
        pathType: ImplementationSpecific
        backend:
          service:
            name: web1-svc
            port:
              number: 8080
